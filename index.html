function PageWorkup(){

    {id:'biopsy',label:'Tissue biopsy to confirm suspected plasmacytoma',cat:'Pathology',note:'Essential for solitary plasmacytoma diagnosis. Must demonstrate clonal plasma cells.'},
    {id:'echo',label:'Echocardiogram',cat:'Cardiac',note:'If cardiac amyloidosis suspected, or before carfilzomib (cardiac toxicity risk). Baseline recommended.'},
