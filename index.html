function WorkupPage() {
  var _s = useState({}); var checked = _s[0]; var setChecked = _s[1];
  function toggle(id) { setChecked(function(p) { var n = Object.assign({},p); n[id] = !n[id]; return n; }); }
  var done = WORKUP_ESSENTIAL.filter(function(i){return checked[i.id]}).length;
  var total = WORKUP_ESSENTIAL.length;
  var pct = Math.round((done/total)*100);

  function renderList(items, label, badgeClass) {
    return e('div', {className:'card p-5'},
      e('h3', {className:'font-semibold mb-3 flex items-center gap-2'},
        e('span', {className:'badge '+badgeClass}, label),
        ' Investigations'
      ),
      e('div', {className:'space-y-1'},
        items.map(function(item) {
          return e('label', {key:item.id, className:'flex items-start gap-2 py-1 cursor-pointer'},
            e('input', {type:'checkbox', checked:!!checked[item.id], onChange:function(){toggle(item.id)}, className:'checklist-item mt-1'}),
            e('div', null,
              e('span', {className:'text-sm '+(checked[item.id]?'line-through text-slate-400':'')}, item.label),
              e('span', {className:'ml-2 badge bg-slate-100 text-slate-500 text-[10px]'}, item.cat)
            )
          );
        })
      )
    );
  }

  return e('div', null,
    e('div', {className:'flex items-center justify-between mb-6'},
      e('div', null,
        e('h2', {className:'text-xl font-bold'}, 'MYEL-1: Initial Diagnostic Workup'),
        e('p', {className:'text-sm text-slate-500'}, 'Complete workup checklist for suspected myeloma')
      ),
      e('div', {className:'card p-3 text-center'},
        e('p', {className:'text-2xl font-bold text-blue-600'}, pct+'%'),
        e('p', {className:'text-xs text-slate-500'}, 'Complete')
      )
    ),
    e('div', {className:'card p-4 mb-4'},
      e('div', {className:'flex items-center justify-between mb-2'},
        e('span', {className:'text-sm font-medium'}, 'Essential Investigations'),
        e('span', {className:'text-sm text-slate-500'}, done+'/'+total)

      e('div', {className:'w-full bg-slate-200 rounded-full h-2.5'},
        e('div', {className:'bg-blue-600 rounded-full h-2.5 transition-all', style:{width:pct+'%'}})
      )
    ),
    e('div', {className:'grid grid-cols-1 lg:grid-cols-2 gap-4'},
      renderList(WORKUP_ESSENTIAL, 'Essential', 'bg-blue-600 text-white'),
      e('div', null,

            e('li', null, '• 1q21 amplification = ≥4 copies by FISH; gain = 3 copies')
          )
        )
      )
    )
  );
}

             {t:'4. Assess HCT Candidacy',s:'Refer to HCT center, harvest stem cells',c:'bg-emerald-50 border-emerald-200 text-emerald-800'}
