// ─── CALCULATOR PAGE ───
function CalculatorPage() {
  const [impedeChecked, setImpedeChecked] = useState({});
  const toggleImpede = idx => setImpedeChecked(p => ({...p, [idx]: !p[idx]}));

  const impedeScore = IMPEDE_FACTORS.reduce((sum, f, i) => sum + (impedeChecked[i] ? f.points : 0), 0);
  const impedeRisk = impedeScore >= 4 ? 'High Risk' : 'Low Risk';
  const impedeColor = impedeScore >= 4 ? 'text-rose-600' : 'text-emerald-600';

  return (
    <div>
      <h2 className="text-xl font-bold text-foreground mb-1">MYEL-K: VTE Risk Calculator</h2>
      <p className="text-sm text-muted-foreground mb-6">IMPEDE score for VTE risk stratification in myeloma</p>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div className="lg:col-span-2 card p-5">
          <h3 className="font-semibold mb-4">IMPEDE Score Calculator</h3>
          <div className="space-y-2">
            {IMPEDE_FACTORS.map((f, i) => (
              <label key={i} className="flex items-center gap-3 p-2 rounded-lg hover:bg-secondary cursor-pointer">
                <input type="checkbox" checked={!!impedeChecked[i]} onChange={() => toggleImpede(i)} className="w-4 h-4" />
                <span className="flex-1 text-sm">{f.factor}</span>
                <span className={`badge ${f.points > 0 ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'} text-xs`}>
                  {f.points > 0 ? '+' : ''}{f.points}
                </span>
              </label>
            ))}
          </div>
        </div>

        <div className="space-y-4">
          <div className="card p-5 text-center">
            <p className="text-sm text-muted-foreground mb-1">IMPEDE Score</p>
            <p className={`text-4xl font-bold ${impedeColor}`}>{impedeScore}</p>
            <p className={`text-sm font-semibold mt-1 ${impedeColor}`}>{impedeRisk}</p>
            <div className="mt-3 text-xs text-muted-foreground">
              <p>≤3 points = Low risk</p>
              <p>≥4 points = High risk</p>
            </div>
          </div>

          <div className="card p-5">
            <h4 className="font-semibold text-sm mb-3">VTE Prophylaxis Recommendation</h4>
            {impedeScore >= 4 ? (
              <div className="p-3 bg-rose-50 rounded-lg border border-rose-200">
                <p className="font-medium text-sm text-rose-800">Anticoagulation Required</p>
                <ul className="text-xs text-rose-700 mt-2 space-y-1">
                  <li>• LMWH (enoxaparin 40 mg daily)</li>
                  <li>• OR Rivaroxaban 10 mg daily</li>
                  <li>• OR Apixaban 2.5 mg BID</li>
                  <li>• OR Fondaparinux 2.5 mg daily</li>
                  <li>• OR Warfarin (INR 2.0-3.0)</li>
                </ul>
              </div>
            ) : (
              <div className="p-3 bg-emerald-50 rounded-lg border border-emerald-200">
                <p className="font-medium text-sm text-emerald-800">Aspirin Prophylaxis</p>
                <p className="text-xs text-emerald-700 mt-1">Aspirin 81–325 mg once daily</p>
              </div>
            )}
            <p className="text-xs text-muted-foreground mt-3">Duration: Indefinite while on myeloma therapy; 3–6 months then aspirin</p>
          </div>
        </div>
      </div>
    </div>
  );
}

            <p><strong>3:</strong> Mildly toxic — interferes with ADLs</p>
            <p><strong>2:</strong> Moderately toxic — significant but rarely fatal</p>
            <p><strong>1:</strong> Highly toxic — life-threatening toxicity common</p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── RELATED DISORDERS PAGE ───
function RelatedPage() {
  const [tab, setTab] = useState('mgrs');

  return (
    <div>
      <h2 className="text-xl font-bold text-foreground mb-1">Related Plasma Cell Disorders</h2>
      <p className="text-sm text-muted-foreground mb-4">MGRS, MIDD, MGNS, and POEMS syndrome</p>

      <div className="flex gap-1 border-b border-border mb-4 overflow-x-auto">
        {[{id:'mgrs',label:'MGRS'},{id:'midd',label:'MIDD'},{id:'mgns',label:'MGNS'},{id:'poems',label:'POEMS'}].map(t =>
          <div key={t.id} className={`tab-trigger ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>{t.label}</div>
        )}
      </div>

      {tab === 'mgrs' && (
        <div className="card p-5">
          <h3 className="font-semibold mb-3">Monoclonal Gammopathy of Renal Significance (MGRS)</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <h4 className="font-medium text-sm mb-2">Initial Workup</h4>
              <ul className="text-sm text-muted-foreground space-y-1">
                <li>• Kidney function: established GFR (eGFR)</li>
                <li>• Urinalysis</li>
                <li>• 24-h urine for total protein, UPEP, and UIFE</li>
                <li>• Metabolic panel</li>
              </ul>
              <h4 className="font-medium text-sm mt-4 mb-2">Renal Biopsy Recommended if:</h4>
              <ul className="text-sm text-muted-foreground space-y-1">
                <li>• AKI stage 3</li>
                <li>• eGFR {'<'}60 mL/min AND {'>'}2 mL/min/year decline</li>
                <li>• Proteinuria ({'>'}1 g/day)</li>
                <li>• Evidence of light chain proteinuria</li>
                <li>• Fanconi syndrome</li>
              </ul>
            </div>
            <div>
              <h4 className="font-medium text-sm mb-2">Confirm Diagnosis</h4>
              <ul className="text-sm text-muted-foreground space-y-1">
                <li>• Light microscopy</li>
                <li>• Immunofluorescence staining (IgG subclasses, IgA, IgM, κ, λ)</li>
                <li>• Electron microscopy</li>
                <li>• M-protein in serum/urine must match renal biopsy</li>
              </ul>
              <h4 className="font-medium text-sm mt-4 mb-2">Treatment by Clone Type</h4>
              <ul className="text-sm text-muted-foreground space-y-1">
                <li>• IgG/IgA-associated → MM response criteria (MYEL-E)</li>
                <li>• IgM-associated → WM response criteria</li>
                <li>• FLC-associated → Amyloidosis response criteria</li>
                <li>• Plasma cell-related → MM algorithm (MYEL-4)</li>
              </ul>
            </div>
          </div>
        </div>
      )}

      {tab === 'midd' && (
        <div className="card p-5">
          <h3 className="font-semibold mb-3">Monoclonal Immunoglobulin Deposition Disease (MIDD)</h3>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            {[
              { type:'LCDD', pct:'~80%', desc:'Light chain deposition (80-90% Kappa LC)' },
              { type:'HCDD', pct:'~10%', desc:'Heavy chain deposition disease' },
              { type:'LHCDD', pct:'~10%', desc:'Light and heavy chain deposition' },
            ].map((t, i) => (
              <div key={i} className="p-3 bg-secondary rounded-lg text-center">
                <p className="font-bold text-lg text-primary">{t.type}</p>
                <p className="text-sm font-medium">{t.pct}</p>
                <p className="text-xs text-muted-foreground">{t.desc}</p>
              </div>
            ))}
          </div>
          <div className="p-3 bg-blue-50 rounded-lg text-sm text-blue-800">
            <p><strong>Organ involvement:</strong> Kidney (~96%), Heart (~21%), Liver (~19%), Peripheral nervous system (~8%)</p>
            <p className="mt-1"><strong>Transplant:</strong> Autologous HCT consolidation preferable in eligible patients. Consider solid organ transplant for affected organs.</p>
          </div>
        </div>
      )}

      {tab === 'mgns' && (
        <div className="card p-5">
          <h3 className="font-semibold mb-3">Monoclonal Gammopathy of Neurological Significance (MGNS)</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="p-4 bg-emerald-50 rounded-lg border border-emerald-200">
              <h4 className="font-medium text-emerald-800 mb-2">High Suspicion → Treat</h4>
              <ul className="text-sm text-emerald-700 space-y-1">
                <li>• Sensory predominant, length dependent</li>
                <li>• Slow progression (years)</li>
                <li>• Bilateral and symmetrical</li>
                <li>• Antibodies present</li>
                <li>• Demyelination by EMG/NCS AND affecting ADLs</li>
              </ul>
              <p className="text-sm font-medium text-emerald-800 mt-2">→ See WM/LPL guidelines</p>
            </div>
            <div className="p-4 bg-gray-50 rounded-lg border border-gray-200">
              <h4 className="font-medium text-gray-800 mb-2">Low Suspicion → Observe</h4>
              <ul className="text-sm text-gray-700 space-y-1">
                <li>• Motor/pain predominant</li>
                <li>• Rapid progression (weeks-months)</li>
                <li>• Unilateral/asymmetrical</li>
                <li>• No antibodies</li>
                <li>• No demyelination OR not affecting ADLs</li>
              </ul>
              <p className="text-sm font-medium text-gray-800 mt-2">→ Observation</p>
            </div>
          </div>
        </div>
      )}

      {tab === 'poems' && (
        <div className="card p-5">
          <h3 className="font-semibold mb-3">POEMS Syndrome — Diagnostic Criteria</h3>
          <div className="space-y-3">
            <div className="p-3 bg-rose-50 rounded-lg border border-rose-200">
              <h4 className="font-medium text-rose-800 mb-1">Mandatory Major Criteria (BOTH required)</h4>
              <p className="text-sm text-rose-700">1. Polyneuropathy (typical demyelinating)</p>
              <p className="text-sm text-rose-700">2. Monoclonal plasma cell-proliferative disorder (almost always λ)</p>
            </div>
            <div className="p-3 bg-amber-50 rounded-lg border border-amber-200">
              <h4 className="font-medium text-amber-800 mb-1">Other Major Criteria (ONE required)</h4>
              <p className="text-sm text-amber-700">3. Castleman disease | 4. Sclerotic bone lesions | 5. VEGF elevation</p>
            </div>
            <div className="p-3 bg-blue-50 rounded-lg border border-blue-200">
              <h4 className="font-medium text-blue-800 mb-1">Minor Criteria (ONE required)</h4>
              <p className="text-sm text-blue-700">6. Organomegaly | 7. Extravascular volume overload | 8. Endocrinopathy | 9. Skin changes | 10. Papilledema | 11. Thrombocytosis/polycythemia</p>
            </div>
          </div>
          <div className="mt-4 p-3 bg-secondary rounded-lg">
            <p className="text-sm font-medium">Treatment:</p>
            <ul className="text-sm text-muted-foreground space-y-1 mt-1">
              <li>• RT alone for isolated bone lesion ({'<'}3 sites) without clonal BMPC</li>
              <li>• Autologous HCT in eligible patients</li>
              <li>• Induction: Len/Dex ± Dara, Bortezomib/Dex, CyDex, Pom/Dex</li>
              <li>• Non-HCT candidates: above + Melphalan/Dex</li>
            </ul>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── RENDER ───
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
